name: CI - Verificación de TypeScript

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Se eliminó la línea de cache para evitar errores en la raíz

      # Verificación del Backend (NestJS)
      - name: Instalar dependencias Backend
        run: npm install
        working-directory: ./server

      - name: Type-check Backend
        run: npm run start:dev -- --dry-run
        working-directory: ./server

      # Verificación del Frontend (React + Vite)
      - name: Instalar dependencias Frontend
        run: npm install
        working-directory: ./client

      - name: Type-check Frontend
        run: npx tsc --noEmit
        working-directory: ./client